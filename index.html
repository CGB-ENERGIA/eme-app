<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#9B003C" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#6B0028" media="(prefers-color-scheme: dark)" />
    <meta name="background-color" content="#9B003C" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="EME" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="description" content="Formulário de Atendimento Emergencial - CGB Engenharia" />
    <title>EME — Atendimento Emergencial</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        min-height: 100%;
        min-height: 100svh;
        background: #9B003C;
      }
      #eme-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: clamp(16px, 4vw, 28px);
        padding: max(24px, env(safe-area-inset-top)) max(24px, env(safe-area-inset-right)) max(32px, env(safe-area-inset-bottom)) max(24px, env(safe-area-inset-left));
        background: linear-gradient(160deg, #4A001C 0%, #6B0028 35%, #9B003C 70%, #C0014A 100%);
        color: #fff;
        font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        transition: opacity 0.45s ease, visibility 0.45s ease;
      }
      #eme-splash.eme-splash--hide {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      #eme-splash .eme-splash__logo {
        width: clamp(88px, 22vw, 128px);
        height: clamp(88px, 22vw, 128px);
        background: #fff;
        border-radius: clamp(20px, 5vw, 28px);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 16px 48px rgba(0, 0, 0, 0.28);
        animation: eme-splash-pop 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      #eme-splash .eme-splash__logo svg {
        width: 68%;
        height: 68%;
      }
      #eme-splash .eme-splash__brand {
        text-align: center;
        animation: eme-splash-fade 0.7s ease 0.12s both;
      }
      #eme-splash .eme-splash__brand strong {
        display: block;
        font-size: clamp(28px, 7vw, 40px);
        font-weight: 800;
        letter-spacing: 0.04em;
        line-height: 1.1;
      }
      #eme-splash .eme-splash__brand span {
        display: block;
        margin-top: 8px;
        font-size: clamp(12px, 3.2vw, 14px);
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(255, 210, 220, 0.92);
      }
      #eme-splash .eme-splash__loader {
        width: clamp(36px, 10vw, 44px);
        height: clamp(36px, 10vw, 44px);
        border: 3px solid rgba(255, 255, 255, 0.22);
        border-top-color: #fff;
        border-radius: 50%;
        animation: eme-splash-spin 0.85s linear infinite, eme-splash-fade 0.7s ease 0.2s both;
        margin-top: clamp(8px, 2vw, 16px);
      }
      #eme-splash .eme-splash__footer {
        position: absolute;
        bottom: max(28px, env(safe-area-inset-bottom));
        left: 0;
        right: 0;
        text-align: center;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: rgba(255, 200, 215, 0.75);
        animation: eme-splash-fade 0.7s ease 0.25s both;
      }
      @keyframes eme-splash-spin {
        to { transform: rotate(360deg); }
      }
      @keyframes eme-splash-pop {
        from { opacity: 0; transform: scale(0.86) translateY(10px); }
        to { opacity: 1; transform: scale(1) translateY(0); }
      }
      @keyframes eme-splash-fade {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @media (min-width: 768px) {
        #eme-splash .eme-splash__logo {
          width: 140px;
          height: 140px;
          border-radius: 32px;
        }
      }
    </style>
    <script>
      (function () {
        try {
          var t = localStorage.getItem('eme-theme') || localStorage.getItem('theme');
          if (t === 'dark') document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="eme-splash" role="status" aria-live="polite" aria-label="Carregando EME">
      <div class="eme-splash__logo" aria-hidden="true">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polygon points="50,2 74,26 50,50" fill="#BE0047"/>
          <polygon points="74,26 98,50 50,50" fill="#8A0030"/>
          <polygon points="98,50 74,74 50,50" fill="#BE0047"/>
          <polygon points="74,74 50,98 50,50" fill="#8A0030"/>
          <polygon points="50,98 26,74 50,50" fill="#BE0047"/>
          <polygon points="26,74 2,50 50,50" fill="#8A0030"/>
          <polygon points="2,50 26,26 50,50" fill="#BE0047"/>
          <polygon points="26,26 50,2 50,50" fill="#8A0030"/>
          <polygon points="50,34 66,50 50,66 34,50" fill="white"/>
        </svg>
      </div>
      <div class="eme-splash__brand">
        <strong>EME</strong>
        <span>Atendimento Emergencial</span>
      </div>
      <div class="eme-splash__loader" aria-hidden="true"></div>
      <p class="eme-splash__footer">CGB Engenharia</p>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
