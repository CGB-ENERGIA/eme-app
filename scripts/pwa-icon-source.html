<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 512px;
      height: 512px;
      overflow: hidden;
      background: #9B003C;
    }
    .frame {
      width: 512px;
      height: 512px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #6B0028 0%, #9B003C 55%, #C0014A 100%);
    }
    /* Maskable safe zone ~80%: logo ocupa ~55% */
    .logo-wrap {
      width: 280px;
      height: 280px;
      background: #fff;
      border-radius: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 12px 40px rgba(0,0,0,0.25);
    }
    svg { width: 200px; height: 200px; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <div class="logo-wrap">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="50,2 74,26 50,50" fill="#BE0047"/>
        <polygon points="74,26 98,50 50,50" fill="#8A0030"/>
        <polygon points="98,50 74,74 50,50" fill="#BE0047"/>
        <polygon points="74,74 50,98 50,50" fill="#8A0030"/>
        <polygon points="50,98 26,74 50,50" fill="#BE0047"/>
        <polygon points="26,74 2,50 50,50" fill="#8A0030"/>
        <polygon points="2,50 26,26 50,50" fill="#BE0047"/>
        <polygon points="26,26 50,2 50,50" fill="#8A0030"/>
        <polygon points="50,34 66,50 50,66 34,50" fill="white"/>
      </svg>
    </div>
  </div>
</body>
</html>
